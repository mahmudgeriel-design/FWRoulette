name: Java CI with Maven

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'
        cache: maven
        
    - name: Build with Maven
      # МЫ ПРОСТО СКАЗАЛИ ГИТХАБУ СДЕЛАТЬ ШАГ ВНУТРЬ ТВОЕЙ ПАПКИ!
      run: mvn clean package --file FWRoulette_Project/pom.xml

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: FWRoulette-Plugin
        path: FWRoulette_Project/target/*.jar # Тут тоже указали путь внутри папки
